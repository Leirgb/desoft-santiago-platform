name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Angular frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend for GitHub Pages
        working-directory: frontend
        run: npm run build -- --base-href /desoft-santiago-platform/

      - name: Show build output
        run: |
          echo "Buscando index.html generado..."
          find frontend/dist -maxdepth 4 -name index.html -print
          echo "Contenido de dist:"
          ls -R frontend/dist

      - name: Prepare GitHub Pages artifact
        run: |
          if [ -f "frontend/dist/desoft-santiago-frontend/browser/index.html" ]; then
            echo "Usando salida Angular en browser/"
            cp frontend/dist/desoft-santiago-frontend/browser/index.html frontend/dist/desoft-santiago-frontend/browser/404.html
            touch frontend/dist/desoft-santiago-frontend/browser/.nojekyll
          elif [ -f "frontend/dist/desoft-santiago-frontend/index.html" ]; then
            echo "Usando salida Angular directa en dist/desoft-santiago-frontend/"
            cp frontend/dist/desoft-santiago-frontend/index.html frontend/dist/desoft-santiago-frontend/404.html
            touch frontend/dist/desoft-santiago-frontend/.nojekyll
          else
            echo "No se encontró index.html en frontend/dist"
            exit 1
          fi

      - name: Upload GitHub Pages artifact from browser output
        if: hashFiles('frontend/dist/desoft-santiago-frontend/browser/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/desoft-santiago-frontend/browser

      - name: Upload GitHub Pages artifact from direct output
        if: hashFiles('frontend/dist/desoft-santiago-frontend/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/desoft-santiago-frontend

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4